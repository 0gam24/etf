name: Monthly SEO Audit (Lighthouse + Schema)

# 매월 1일 KST 09:00 = UTC 00:00 자동 실행.
# - Lighthouse SEO 점수 13개 핵심 페이지
# - Schema.org JSON-LD 8개 페이지 (Article·FinancialProduct·Dataset·HowTo 등) 검증
# - 결과 95점 미만 또는 schema 위반 발견 시 GitHub issue 자동 생성
on:
  schedule:
    # 매월 1일 UTC 00:00 = KST 09:00
    - cron: '0 0 1 * *'
  workflow_dispatch:

concurrency:
  group: monthly-seo-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      issues: write

    env:
      TZ: Asia/Seoul
      SITE_URL: ${{ secrets.SITE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Lighthouse + chrome-launcher
        run: npm install --no-save lighthouse chrome-launcher

      - name: Run Schema validation
        id: schema
        continue-on-error: true
        run: npm run validate:schema

      - name: Run Lighthouse SEO audit
        id: lighthouse
        continue-on-error: true
        run: npm run audit:seo

      - name: Read reports
        id: reports
        if: always()
        run: |
          echo "## SEO Audit Report ($(date +%Y-%m-%d))" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Schema validation" >> $GITHUB_STEP_SUMMARY
          if [ -f scripts/.validate-schema-report.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat scripts/.validate-schema-report.json | head -100 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Lighthouse SEO scores" >> $GITHUB_STEP_SUMMARY
          if [ -f scripts/.audit-seo-report.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat scripts/.audit-seo-report.json | head -200 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Open issue on failure
        if: steps.schema.outcome == 'failure' || steps.lighthouse.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const date = new Date().toISOString().slice(0, 10);
            let body = `Monthly SEO audit detected issues on ${date}.\n\n`;
            body += `- Schema validation: ${{ steps.schema.outcome }}\n`;
            body += `- Lighthouse audit: ${{ steps.lighthouse.outcome }}\n\n`;
            body += `Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n`;
            try {
              if (fs.existsSync('scripts/.validate-schema-report.json')) {
                const r = JSON.parse(fs.readFileSync('scripts/.validate-schema-report.json', 'utf-8'));
                const issues = (r.report || []).filter(p => (p.issues && p.issues.length) || p.error);
                if (issues.length) {
                  body += `### Schema issues (${issues.length} pages)\n`;
                  issues.slice(0, 10).forEach(p => {
                    body += `- \`${p.path}\`: ${(p.issues || []).join(', ') || p.error}\n`;
                  });
                }
              }
            } catch {}
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[SEO Audit] ${date} — 자동 점검 실패`,
              body,
              labels: ['seo', 'automated'],
            });
