name: Daily ETF Pulse

# 평일 KST 16:00 = UTC 07:00 에 파이프라인 실행 (KRX 마감 후 당일 시세 확보).
#   - 토·일 cron 제거: KRX 휴장이라 같은 데이터 → 새 글 생성 불가 → 무의미한 run 회피
#   - 16:00 선택 이유: KRX 정규장 마감 15:30 + data.go.kr 갱신 지연 약 30분
#   - 수동 트리거 (workflow_dispatch)는 항상 가능 — 긴급 발행·디버깅용
on:
  schedule:
    # 월~금 07:00 UTC = 16:00 KST
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

# 동시 실행 방지 (이전 run 진행 중이면 큐잉 후 직전 run 취소).
concurrency:
  group: daily-pulse
  cancel-in-progress: false

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # git push 권한 필요 — GITHUB_TOKEN에 write 부여
    permissions:
      contents: write

    env:
      TZ: Asia/Seoul
      # === Secrets (GitHub → Settings → Secrets and variables → Actions) ===
      GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
      DATA_GO_KR_API_KEY:  ${{ secrets.DATA_GO_KR_API_KEY }}
      BOK_ECOS_API_KEY:    ${{ secrets.BOK_ECOS_API_KEY }}
      NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      SITE_URL:            ${{ secrets.SITE_URL }}
      # 선택 (없으면 자동 스킵)
      PULSE_IMAGE_URL:         ${{ secrets.PULSE_IMAGE_URL }}
      INDEXNOW_KEY:            ${{ secrets.INDEXNOW_KEY }}
      GOOGLE_INDEXING_KEY:     ${{ secrets.GOOGLE_INDEXING_KEY }}
      THREADS_USER_ID:         ${{ secrets.THREADS_USER_ID }}
      THREADS_ACCESS_TOKEN:    ${{ secrets.THREADS_ACCESS_TOKEN }}
      # Coupang Partners Open API (선택 — 없으면 fetch:products가 dry-run으로 자동 폴백)
      COUPANG_PARTNERS_ACCESS_KEY: ${{ secrets.COUPANG_PARTNERS_ACCESS_KEY }}
      COUPANG_PARTNERS_SECRET_KEY: ${{ secrets.COUPANG_PARTNERS_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci

      - name: Run pipeline (npm run pulse)
        run: npm run pulse

      - name: Refresh Coupang Partners products (merge with manual curation)
        # 키 없으면 자동으로 dry-run 폴백 → step 실패 안 함
        run: npm run fetch:products:merge || true

      - name: Regenerate today.md (운영자 매일 한 눈에 보는 발행 일지)
        # content/ 발행 후 today.md 도 함께 갱신 — pipeline 0건이어도 lastUpdated 시점 갱신.
        # 본 step 실패해도 commit·push 계속 진행 (today.md 는 부차적).
        run: npm run generate:today || true

      - name: Diagnostic — disk + git state (왜 발행 0건인지 추적)
        # 2026-04-25 ~ 05-08: cron 16회 모두 success / HarnessDeployer "발행 N개" 로그 / 그러나 commit 0건.
        # 원인 찾기 위해 commit step 직전 디스크 상태·git 상태 명시 출력.
        if: always()
        run: |
          echo "=== content/* 디스크 상태 (HarnessDeployer write 직후) ==="
          for cat in pulse surge flow income breaking; do
            echo "--- content/$cat/ ---"
            ls -la "content/$cat/" 2>/dev/null | tail -10 || echo "(empty/missing)"
          done
          echo ""
          echo "=== data/.last-pulse-base-date ==="
          cat data/.last-pulse-base-date 2>/dev/null || echo "(missing — orchestrator skip 게이트 의심)"
          echo ""
          echo "=== git status (untracked + modified) ==="
          git status --untracked-files=all --short | head -40
          echo ""
          echo "=== content/ 디렉토리 변경 ==="
          git status content/ --short | head -20 || echo "(no content/ changes)"

      - name: Commit generated content + data
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/ data/ public/ today.md || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            TODAY=$(date +%Y-%m-%d)
            git commit -m "chore(pulse): daily update $TODAY"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Push
        if: steps.commit.outputs.changed == 'true'
        run: git push

      - name: Summary
        if: always()
        run: |
          echo "## Daily ETF Pulse Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Changed: ${{ steps.commit.outputs.changed }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time (KST): $(date)" >> $GITHUB_STEP_SUMMARY

          # ── DataMiner 결과 진단 (KRX API 정상 응답 여부) ───────────────
          LATEST_PRICE=$(ls -t data/raw/etf_prices_*.json 2>/dev/null | head -1)
          if [ -n "$LATEST_PRICE" ]; then
            DIAG=$(node -e "
              const d = require('./$LATEST_PRICE');
              const x = d.data || {};
              const out = {
                isRealData: x.isRealData ?? null,
                source: x.source ?? '',
                baseDate: x.baseDate ?? '',
                etfCount: x.etfCount ?? 0,
                byVolumeLen: (x.byVolume || []).length,
                sectorFlowLen: (x.sectorFlow || []).length,
              };
              console.log(JSON.stringify(out));
            " 2>/dev/null || echo '{}')
            echo "- DataMiner: \`$DIAG\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- DataMiner: ⚠️ data/raw/etf_prices_*.json 파일 없음 (DataMiner 실행 자체 실패 추정)" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f data/.last-pulse-base-date ]; then
            echo "- Last published baseDate (KRX 거래일): \`$(cat data/.last-pulse-base-date)\`" >> $GITHUB_STEP_SUMMARY
          fi

          # ── 오늘 cron 의 에이전트 실행 추적 (어디서 막혔는지) ──────────
          LOG_FILE="logs/pipeline_$(date +%Y%m%d).json"
          if [ -f "$LOG_FILE" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Agent 실행 추적 (시간순 마지막 12건)" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            node -e "
              const l = require('./$LOG_FILE');
              l.slice(-12).forEach(e => console.log(JSON.stringify({
                agent: e.agent,
                status: e.status,
                summary: (e.outputSummary || '').slice(0, 120),
                error: (e.error || '').slice(0, 200),
              })));
            " >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⚠️ logs/pipeline_$(date +%Y%m%d).json 없음 — 파이프라인이 첫 단계 전 종료된 것" >> $GITHUB_STEP_SUMMARY
          fi

          # ── 누적 카운트 ────────────────────────────────────────────
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 콘텐츠 누적 카운트" >> $GITHUB_STEP_SUMMARY
          for cat in pulse surge flow income breaking; do
            if [ -d "content/$cat" ]; then
              echo "- $cat: $(ls content/$cat/*.mdx 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # ── 변경 없음 진단 — 자가진단 가이드 ─────────────────────────
          if [ "${{ steps.commit.outputs.changed }}" = "false" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ⚠️ 신규 발행 0건 — 자가진단" >> $GITHUB_STEP_SUMMARY
            echo "위 Agent 실행 추적에서 마지막 status=completed 인 에이전트가 어디인지 확인하면 어디서 막혔는지 알 수 있음. 일반 원인:" >> $GITHUB_STEP_SUMMARY
            echo "  1. **DataMiner isRealData=false** → DATA_GO_KR_API_KEY 만료 또는 KRX API 일시 장애" >> $GITHUB_STEP_SUMMARY
            echo "  2. **DataMiner status=completed 후 즉시 종료** → orchestrator 의 same-baseDate skip 게이트 (직전 발행과 같은 거래일)" >> $GITHUB_STEP_SUMMARY
            echo "  3. **SeoArchitect summary='0개 전략'** → DataMiner 의 byVolume/sectorFlow 가 비어있음" >> $GITHUB_STEP_SUMMARY
            echo "  4. **LogicSpecialist status=failed** → Gemini 쿼터 (RESOURCE_EXHAUSTED) 또는 GEMINI_API_KEY 만료" >> $GITHUB_STEP_SUMMARY
            echo "  5. **YmylGuard summary='검증 통과 0건'** → 본문 BANNED_PHRASES 또는 메타 단어로 전부 차단" >> $GITHUB_STEP_SUMMARY
            echo "  6. **HarnessDeployer summary='발행 0건'** → 슬러그 정규식 미일치 또는 콘텐츠 길이 미달로 SEO 차단" >> $GITHUB_STEP_SUMMARY
          fi
